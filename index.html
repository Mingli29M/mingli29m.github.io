<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print Counter — Mingli29</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.72);
      --text: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(0, 0, 0, 0.08);
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "SF Pro Text", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at 15% 10%, #d7e8ff 0%, transparent 45%),
                  radial-gradient(circle at 85% 85%, #f5dfff 0%, transparent 40%),
                  var(--bg);
      color: var(--text);
    }

    .counter-section {
      width: min(960px, 100%);
      padding: clamp(2rem, 4vw, 4rem);
      border-radius: 36px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .eyebrow {
      margin: 0;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.78rem;
      color: var(--muted);
    }

    h1 {
      margin: 0.8rem 0 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      font-weight: 650;
    }

    .lead {
      margin: 1rem auto 0;
      max-width: 620px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.55;
    }

    .count {
      margin: clamp(1.8rem, 4vw, 2.7rem) 0 0;
      font-size: clamp(2.8rem, 11vw, 6.7rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .label {
      margin: 0.6rem 0 0;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .actions {
      margin-top: clamp(1.6rem, 3vw, 2rem);
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 0.9rem 1.4rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 28px rgba(0, 113, 227, 0.35);
    }

    .primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .secondary {
      background: rgba(255, 255, 255, 0.85);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .secondary:hover {
      background: #fff;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      min-height: 1.3rem;
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .counter-section {
        border-radius: 26px;
      }
    }
  </style>
</head>
<body>
  <section class="counter-section" aria-labelledby="counterTitle">
    <p class="eyebrow">Temporary Public Page</p>
    <h1 id="counterTitle">Web Print Counter</h1>
    <p class="lead">This site is currently focused on one thing: tracking the public print count in a clean, modern single section.</p>

    <p id="counterValue" class="count" aria-live="polite">0</p>
    <p class="label">Total Prints</p>

    <div class="actions">
      <button id="incrementBtn" class="primary" type="button">Add Print</button>
      <button id="resetBtn" class="secondary" type="button">Reset</button>
    </div>

    <p id="statusText" class="status" role="status"></p>
  </section>

  <script>
    const STORAGE_KEY = 'mingli_print_counter';
    const counterValue = document.getElementById('counterValue');
    const statusText = document.getElementById('statusText');
    const incrementBtn = document.getElementById('incrementBtn');
    const resetBtn = document.getElementById('resetBtn');

    const parseSavedCount = () => {
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = Number.parseInt(raw ?? '', 10);
      return Number.isFinite(parsed) && parsed >= 0 ? parsed : 0;
    };

    let count = parseSavedCount();

    const render = () => {
      counterValue.textContent = count.toLocaleString();
    };

    const persist = () => {
      localStorage.setItem(STORAGE_KEY, String(count));
    };

    incrementBtn.addEventListener('click', () => {
      count += 1;
      persist();
      render();
      statusText.textContent = 'Counter updated.';
    });

    resetBtn.addEventListener('click', () => {
      count = 0;
      persist();
      render();
      statusText.textContent = 'Counter reset to zero.';
    });

    render();
  </script>
</body>
</html>
